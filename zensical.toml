[project]
site_name = "GovCMS Developer Documentation"
site_description = "Community maintained developer documentation for the GovCMS platform and Drupal distribution."
site_url = "https://jackwrfuller.github.io/govcms-docs-poc/"
repo_url = "https://github.com/govCMS/GovCMS"
repo_name = "govCMS/GovCMS"
extra_css = ["stylesheets/extra.css"]
nav = [
  { Home = "index.md" },
  { "The GovCMS Platform" = [
    { "Overview" = "platform/overview.md" },
    { "Lagoon" = "platform/lagoon.md" },
    { "GovCMS Lagoon-ready Images" = "platform/govcms-lagoon-ready-images.md" },
    { "Scaffold-Tooling" = "platform/scaffold-tooling.md" },
    { "Project Templates" = "platform/project-scaffolds.md" },
    { "Akamai CDN/WAF" = "platform/akamai.md" },
    { "SaaS vs PaaS" = "platform/saas-vs-pass.md" },
  ]},
  { "The GovCMS Distribution" = [
    { "Overview" = "distribution/overview.md" },
    { "Modules" = "distribution/modules.md" },
    { "Module Lifecycle" = "distribution/module-lifecycle.md" },
    { "Release Process" = "distribution/release-process.md" },
    { "Contributing" = "distribution/contributing.md" },
  ]},
  { "Developing on GovCMS" = [
    { "Local Development Setup" = "developing/local-dev-setup.md" },
    { "Drupal Configuration Strategies" = "developing/drupal-config-strategies.md" },
    { "CI/CD" = "developing/ci-cd.md" },
    { "Backups" = "developing/backups.md" },
    { "Cron" = "developing/cron.md" },
    { "Forklifts" = "developing/forklifts.md" },
  ]},
  { "FAQs" = [
    
  ]},
]

[project.theme]
logo = "assets/img/govcms-star-white.png"
favicon = "assets/img/favicon.ico"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.features]
navigation.sections = true
navigation.expand = true
navigation.top = true
search.suggest = true
search.highlight = true
content.code.copy = true

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

