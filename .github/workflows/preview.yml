name: Docs Preview

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'zensical.toml'

jobs:
  preview:
    name: Build docs preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean
      - uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: site/
          retention-days: 7
